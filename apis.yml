aid: heyform
name: HeyForm
description: >-
  HeyForm is an open-source conversational form builder that enables anyone to
  create engaging forms, surveys, quizzes, and polls without coding. It provides
  a REST API and webhook integrations for creating and managing forms,
  collecting responses, configuring conditional logic, and embedding forms in
  any web application. With 30+ integrations including Zapier, Slack, Google
  Sheets, Airtable, HubSpot, and Stripe, HeyForm suits small businesses and
  developers who want full data ownership. Licensed under AGPL-3.0, it can be
  self-hosted or used via the managed cloud service.
type: Index
